    body:
      string: '{"translations":[{"text":"<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE
        document SYSTEM \"CommonMark.dtd\">\n<document xmlns=\"http://commonmark.org/xml/1.0\">\n  <heading
        level=\"1\">\n   <text xml:space=\"preserve\">Introduction</text>\n  </heading>\n  <heading
        level=\"3\"><emph>\n    \n     <text xml:space=\"preserve\">Blattisocius cakmaki</text>\n    \n
        </emph> <text xml:space=\"preserve\">    Khanjani &amp; Safiarian \n </text>
        <strong>   \n <text xml:space=\"preserve\">     n. sp.</text>\n    \n </strong></heading>\n  <heading
        level=\"4\">\n   <text xml:space=\"preserve\">Diagnostic</text>\n  </heading>\n  <paragraph>\n   <text
        xml:space=\"preserve\">Au sein de la \n   </text><emph>\n      <strong>\n       <text
        xml:space=\"preserve\">Phytoseioidea</text>\n      </strong>\n    </emph>\n   <text
        xml:space=\"preserve\">, les acariens de la famille \n </text> <strong>   \n
        <text xml:space=\"preserve\">     Blattisociidae</text> </strong> <text xml:space=\"preserve\">
        \n    \n     se reconnaissent à leur apotèle palpaire-tarsien à deux dents,
        à leurs boucliers podonotal et opisthonotal fusionnés et à la présence de
        20 paires de soies sur le tégument latéral non sclérifié qui entoure le bouclier
        dorsal (Moraes \n </text> <emph>   \n <text xml:space=\"preserve\">     et
        al.</text>\n    \n </emph> <text xml:space=\"preserve\">   , 2016).</text>\n  </paragraph>\n  <heading
        level=\"4\">\n   <text xml:space=\"preserve\">Femelles (n = 11)</text>\n  </heading>\n  <paragraph><strong>\n    \n     <text
        xml:space=\"preserve\">Idiosome dorsal</text>\n    \n </strong> <text xml:space=\"preserve\">    ---
